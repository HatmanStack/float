name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.claude/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'
            backend:
              - 'backend/**'
              - '.github/workflows/**'

  frontend:
    name: Frontend Lint & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test -- --ci --forceExit

  backend:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    env:
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET: test-bucket
      PYTHONPATH: ${{ github.workspace }}/backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Setup Python
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: ./backend
        # uv replaces pip here for two reasons:
        # 1. Speed: full install drops from 4+ minutes to ~3 seconds.
        # 2. Resolver: pip's backtracking resolver was hitting
        #    "resolution-too-deep" on the unconstrained google-* /
        #    boto3 / pydantic / openai dep tree. uv uses PubGrub and
        #    completes the same resolution in <1s.
        run: |
          uv venv .venv --python 3.13
          source .venv/bin/activate
          uv pip install -r requirements.txt -r requirements-dev.txt
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Lint
        working-directory: ./backend
        run: ruff check .

      - name: File-size guardrail
        working-directory: ./backend
        run: |
          # Plan 2026-04-08-audit-float: no backend src file >450 lines.
          # Phase 4 targets <400 lines; the 50-line slack prevents incidental
          # growth from firing the guardrail. See Phase 5 Task 2 for the
          # rationale and Phase 4 Task 1/2 for the underlying targets.
          offenders=$(find src -name '*.py' -print0 \
            | xargs -0 wc -l \
            | awk '$1 > 450 && $2 != "total" { print $2, $1 }')
          if [ -n "$offenders" ]; then
            echo "Files exceeding 450 lines:"
            echo "$offenders"
            exit 1
          fi

      - name: Tests
        run: pytest backend/tests -v --tb=short

      - name: Dockerfile lint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: backend/Dockerfile

  pip-audit:
    name: Backend Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    # pip-audit can be temporarily silenced via `--ignore-vuln <id>` for
    # documented false positives, but only with a matching CHANGELOG entry.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/requirements.txt

      - name: Setup Python
        run: uv python install 3.13

      - name: Compile lockfile
        working-directory: ./backend
        # uv resolves the same dep tree pip-audit would resolve, in
        # under a second. Pinning every transitive into a flat lockfile
        # lets pip-audit run as a flat scan instead of re-doing pip's
        # backtracking resolver (which currently times out at 4
        # minutes on this requirements.txt).
        run: uv pip compile requirements.txt -o requirements.lock

      - name: Audit
        working-directory: ./backend
        # --disable-pip + --no-deps treats the uv-resolved lockfile as
        # the source of truth instead of re-running pip's resolver.
        run: uvx pip-audit==2.7.3 -r requirements.lock --disable-pip --no-deps

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23
        with:
          globs: |
            **/*.md
            !node_modules/**
            !.claude/**
            !backend/.venv/**
            !backend/.aws-sam/**
            !**/CHANGELOG.md
            !docs/plans/**
            !frontend/tests/**/README.md

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --no-progress
            --exclude '^mailto:'
            --exclude '^https://your-lambda-url'
            --exclude '^https://www.apache.org/licenses/LICENSE-2.0.html'
            './**/*.md'
            '!./node_modules/**'
            '!./backend/.aws-sam/**'
            '!./docs/plans/**'
          fail: true

  status-check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend, backend, pip-audit, markdownlint, link-check]
    if: always()
    steps:
      - name: Verify
        run: |
          results=(
            "${{ needs.frontend.result }}"
            "${{ needs.backend.result }}"
            "${{ needs.pip-audit.result }}"
            "${{ needs.markdownlint.result }}"
            "${{ needs.link-check.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more checks failed: $result"
              exit 1
            fi
          done
          echo "All checks passed!"
